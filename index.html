<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0c0c10;color:#e2e2e8;min-height:100vh}

/* ── Header ── */
.header{padding:26px 36px 18px;border-bottom:1px solid #1a1a24;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.header-left h1{font-size:20px;font-weight:700;letter-spacing:-.3px;color:#fff}
.header-left p{font-size:12px;color:#555568;margin-top:3px}
.view-tabs{display:flex;gap:4px;background:#13131a;border:1px solid #1e1e2a;border-radius:10px;padding:3px}
.view-tab{padding:6px 16px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;border:none;background:transparent;color:#55556a}
.view-tab.active{background:#5b4fff;color:#fff}
.view-tab .badge{margin-left:5px;background:rgba(255,255,255,.18);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700}
.view-tab:not(.active) .badge{background:#ff4f6d}

/* ── Controls ── */
.controls{padding:12px 36px;border-bottom:1px solid #1a1a24;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.search-wrap{position:relative;flex:1;min-width:180px;max-width:280px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:#44445a;pointer-events:none}
.controls input[type=text]{width:100%;padding:7px 10px 7px 32px;background:#13131a;border:1px solid #1e1e2a;border-radius:8px;color:#e2e2e8;font-size:12px;outline:none}
.controls input[type=text]:focus{border-color:#5b4fff}
.controls input[type=text]::placeholder{color:#33334a}
.filter-group{display:flex;gap:5px;flex-wrap:wrap}
.fb{padding:5px 12px;border-radius:20px;border:1px solid #1e1e2a;background:#13131a;color:#666680;font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.fb:hover{border-color:#3a3a54;color:#a0a0c0}
.fb.on{background:#1e1a40;border-color:#3a3060;color:#9b8fff}
.sep{width:1px;height:18px;background:#1e1e2a;align-self:center}
.count{font-size:11px;color:#444458;margin-left:auto}

/* ── Grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px;padding:20px 36px 60px}
.empty{grid-column:1/-1;text-align:center;padding:80px 0;color:#33334a;font-size:13px}
.empty-icon{font-size:32px;display:block;margin-bottom:12px}

/* ── Card ── */
.card{background:#13131a;border:1px solid #1a1a24;border-radius:13px;padding:18px;display:flex;flex-direction:column;gap:11px;transition:border-color .15s,box-shadow .15s}
.card:hover{border-color:#24243a;box-shadow:0 4px 20px rgba(0,0,0,.35)}
.card.favorited{border-color:#2a2410;box-shadow:0 0 0 1px #3a3010}

.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.card-name{font-size:15px;font-weight:700;color:#fff;line-height:1.2}
.card-loc{font-size:11px;color:#555570;margin-top:3px}
.card-actions{display:flex;align-items:center;gap:5px;flex-shrink:0}

/* icon buttons */
.icon-btn{width:28px;height:28px;border-radius:7px;border:1px solid #1e1e2a;background:#13131a;color:#444458;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.icon-btn svg{width:14px;height:14px;pointer-events:none}
.icon-btn:hover{background:#1e1e30;border-color:#2e2e48;color:#a0a0c8}

.fav-btn.starred{background:#242010;border-color:#4a4010;color:#f0c040}
.fav-btn.starred:hover{background:#2e2a14;color:#f8d060}

.discard-btn:hover{background:#2a1a22;border-color:#4a2030;color:#ff6080}
.restore-btn{padding:5px 12px;border-radius:7px;border:1px solid #2a3a2a;background:#1a2a1a;color:#6dbf6d;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s}
.restore-btn:hover{background:#223a22;color:#8fff8f}

.tier-badge{padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.3px}
.t1{background:#1c1840;color:#9b8fff;border:1px solid #2c2860}
.t2{background:#1a2e1a;color:#6dbf6d;border:1px solid #2a3e2a}
.t3{background:#26201a;color:#bf9a5f;border:1px solid #3a3020}

.tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{padding:2px 8px;border-radius:5px;font-size:10px;font-weight:500}
.tag-round{background:#181828;color:#7070a0;border:1px solid #222238}
.tag-raised{background:#182018;color:#5fa05f;border:1px solid #223022}
.tag-emp{background:#181828;color:#6060a0;border:1px solid #22223a}
.tag-ind{background:#201818;color:#906060;border:1px solid #382020}

.card-desc{font-size:12px;color:#7070a0;line-height:1.55}
.fit-box{font-size:11px;color:#5a6a5a;line-height:1.5;padding:9px 11px;background:#0f1410;border-radius:7px;border-left:2px solid #2a3a2a}
.fit-box strong{color:#7ab07a;font-weight:600}

/* ── Notes ── */
.notes-area{position:relative}
.notes-toggle{display:flex;align-items:center;gap:5px;font-size:11px;color:#444458;cursor:pointer;background:none;border:none;padding:0;transition:color .15s}
.notes-toggle:hover{color:#8888a8}
.notes-toggle svg{width:12px;height:12px}
.notes-count{background:#2a2a40;color:#7070a0;border-radius:4px;padding:1px 5px;font-size:10px}
.notes-body{margin-top:8px}
.notes-body textarea{width:100%;background:#0f0f18;border:1px solid #242438;border-radius:7px;color:#c0c0d8;font-size:12px;padding:9px 11px;resize:vertical;min-height:68px;outline:none;font-family:inherit;line-height:1.5;transition:border-color .15s}
.notes-body textarea:focus{border-color:#5b4fff}
.notes-body textarea::placeholder{color:#2e2e48}

.card-links{display:flex;gap:6px;flex-wrap:wrap}
.lbtn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:6px;font-size:11px;font-weight:500;text-decoration:none;border:1px solid #1e1e2a;background:#181828;color:#7070a0;transition:all .15s}
.lbtn:hover{background:#20203a;color:#a0a0c8;border-color:#2a2a48}
.lbtn.primary{background:#1e1a40;color:#9b8fff;border-color:#2e2a60}
.lbtn.primary:hover{background:#262056;color:#b8b0ff}
.lbtn svg{width:12px;height:12px;flex-shrink:0}

.discarded-card{opacity:.55;filter:grayscale(.5)}
.discarded-card:hover{opacity:.75}
</style>

const KEYS = { discarded:'discard_v2', favs:'favs_v1', notes:'notes_v1', openNotes:'open_notes_v1' };
const load = k => new Set(JSON.parse(localStorage.getItem(k)||'[]'));
const loadObj = k => JSON.parse(localStorage.getItem(k)||'{}');
const save = (k,s) => localStorage.setItem(k, JSON.stringify([...s]));
const saveObj = (k,o) => localStorage.setItem(k, JSON.stringify(o));

let discarded = load(KEYS.discarded);
let favs      = load(KEYS.favs);
let notes     = loadObj(KEYS.notes);
let openNotes = load(KEYS.openNotes);

let view='active', tierF='all', regionF='all', roundF='all', query='';

// ── View tabs ──
document.getElementById('tab-active').addEventListener('click', ()=>setView('active'));
document.getElementById('tab-discarded').addEventListener('click', ()=>setView('discarded'));
document.getElementById('tab-fav').addEventListener('click', ()=>setView('fav'));
function setView(v){ view=v; updateTabClasses(); render(); }
function updateTabClasses(){
  ['active','discarded','fav'].forEach(v=>{
    document.getElementById('tab-'+v).classList.toggle('active', view===v);
  });
}

// ── Filter buttons ──
document.querySelectorAll('.fb').forEach(b=>{
  b.addEventListener('click',()=>{
    const g = b.dataset.group;
    document.querySelectorAll(`[data-group="${g}"]`).forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    if(g==='tier')   tierF   = b.dataset.val;
    if(g==='region') regionF = b.dataset.val;
    if(g==='round')  roundF  = b.dataset.val;
    render();
  });
});
document.getElementById('search').addEventListener('input', e=>{ query=e.target.value; render(); });

// ── Event delegation on grid ──
document.getElementById('grid').addEventListener('click', e=>{
  const card = e.target.closest('[data-name]');
  if(!card) return;
  const name = card.dataset.name;

  if(e.target.closest('.discard-btn')){
    discarded.add(name); favs.delete(name);
    save(KEYS.discarded, discarded); save(KEYS.favs, favs);
    render(); return;
  }
  if(e.target.closest('.restore-btn')){
    discarded.delete(name);
    save(KEYS.discarded, discarded);
    render(); return;
  }
  if(e.target.closest('.fav-btn')){
    favs.has(name) ? favs.delete(name) : favs.add(name);
    save(KEYS.favs, favs);
    render(); return;
  }
  if(e.target.closest('.notes-toggle')){
    openNotes.has(name) ? openNotes.delete(name) : openNotes.add(name);
    save(KEYS.openNotes, openNotes);
    render(); return;
  }
});

// Notes textarea — use input event with closure via data-name lookup
document.getElementById('grid').addEventListener('input', e=>{
  if(!e.target.matches('textarea.note-input')) return;
  const name = e.target.closest('[data-name]').dataset.name;
  notes[name] = e.target.value;
  saveObj(KEYS.notes, notes);
  // update toggle counter without full re-render
  const toggle = e.target.closest('[data-name]').querySelector('.notes-count');
  if(toggle) toggle.textContent = e.target.value.trim() ? '1 note' : '';
});

// ── Helpers ──
const esc = s => String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

const rndMatch = (c,f) => {
  if(f==='all') return true;
  const r = c.round.toLowerCase();
  if(f==='seed') return r.includes('seed')||r.includes('safe')||r.includes('convertible')||r.includes('note');
  if(f==='a') return r==='series a';
  if(f==='b') return r==='series b';
  if(f==='c') return r.match(/series [c-z]/);
  return true;
};

const icons = {
  web:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
  li:`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.45 20.45h-3.56v-5.57c0-1.33-.03-3.04-1.85-3.04-1.85 0-2.13 1.45-2.13 2.94v5.67H9.35V9h3.41v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.45v6.29zM5.34 7.43a2.07 2.07 0 1 1 0-4.14 2.07 2.07 0 0 1 0 4.14zM7.12 20.45H3.56V9h3.56v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.45C23.21 24 24 23.23 24 22.28V1.72C24 .77 23.21 0 22.22 0z"/></svg>`,
  jobs:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>`,
  x:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>`,
  star:`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`,
  note:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  restore:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>`,
};
const TL={1:'Tier 1',2:'Tier 2',3:'Tier 3'};
const TC={1:'t1',2:'t2',3:'t3'};

function cardHTML(c, isDiscard){
  const isOpen  = openNotes.has(c.name);
  const isFav   = favs.has(c.name);
  const noteVal = notes[c.name]||'';
  const hasNote = noteVal.trim().length > 0;

  const inds = (c.industries||[]).slice(0,3).map(i=>`<span class="tag tag-ind">${esc(i)}</span>`).join('');

  const actionBtn = isDiscard
    ? `<button class="restore-btn icon-btn">${icons.restore}</button>`
    : `<button class="discard-btn icon-btn" title="Discard">${icons.x}</button>`;

  const favBtn = isDiscard ? '' : `<button class="fav-btn icon-btn${isFav?' starred':''}" title="${isFav?'Unfavourite':'Favourite'}">${icons.star}</button>`;

  const notesSection = isDiscard ? '' : `
  <div class="notes-area">
    <button class="notes-toggle">
      ${icons.note}
      ${isOpen ? 'Hide notes' : 'Add note'}
      ${hasNote?`<span class="notes-count">${noteVal.trim().split('\n').filter(Boolean).length > 1 ? 'note' : '1 note'}</span>`:''}
    </button>
    ${isOpen ? `<div class="notes-body"><textarea class="note-input" placeholder="Jot down anything — contact name, outreach angle, interview status…">${esc(noteVal)}</textarea></div>` : ''}
  </div>`;

  return `<div class="card${isFav?' favorited':''}${isDiscard?' discarded-card':''}" data-name="${esc(c.name)}">
  <div class="card-top">
    <div>
      <div class="card-name">${esc(c.name)}</div>
      <div class="card-loc">${esc(c.location)} · ${esc(c.date)}</div>
    </div>
    <div class="card-actions">
      <span class="tier-badge ${TC[c.tier]}">${TL[c.tier]}</span>
      ${favBtn}
      ${actionBtn}
    </div>
  </div>
  <div class="tags">
    <span class="tag tag-round">${esc(c.round)}</span>
    <span class="tag tag-raised">${esc(c.raised)}</span>
    <span class="tag tag-emp">${esc(c.employees)}</span>
    ${inds}
  </div>
  <p class="card-desc">${esc(c.desc)}</p>
  <div class="fit-box"><strong>Why you fit:</strong> ${esc(c.fit)}</div>
  ${notesSection}
  <div class="card-links">
    ${c.website?`<a class="lbtn primary" href="${esc(c.website)}" target="_blank" rel="noopener">${icons.web} Website</a>`:''}
    ${c.linkedin?`<a class="lbtn" href="${esc(c.linkedin)}" target="_blank" rel="noopener">${icons.li} LinkedIn</a>`:''}
    ${c.jobs?`<a class="lbtn" href="${esc(c.jobs)}" target="_blank" rel="noopener">${icons.jobs} Jobs</a>`:''}
  </div>
</div>`;
}

function render(){
  const q = query.toLowerCase();
  const isDiscard = view==='discarded';
  const isFavView = view==='fav';

  const pool = ALL.filter(c=>{
    if(isDiscard) return discarded.has(c.name);
    if(isFavView) return favs.has(c.name) && !discarded.has(c.name);
    return !discarded.has(c.name) && !favs.has(c.name);
  });

  const visible = pool.filter(c=>{
    if(tierF!=='all' && String(c.tier)!==tierF) return false;
    if(regionF!=='all' && !(c.tags||[]).includes(regionF)) return false;
    if(!rndMatch(c,roundF)) return false;
    if(q && !(c.name+' '+c.location+' '+c.desc+' '+c.fit+' '+(c.industries||[]).join(' ')).toLowerCase().includes(q)) return false;
    return true;
  });

  const emptyMsg = isDiscard
    ? `<span class="empty-icon">🗑️</span>Nothing discarded yet.`
    : isFavView
      ? `<span class="empty-icon">⭐</span>No favourites yet — click the star on any card.`
      : `<span class="empty-icon">🔍</span>No companies match your filters.`;

  document.getElementById('grid').innerHTML = visible.length
    ? visible.map(c=>cardHTML(c, isDiscard)).join('')
    : `<div class="empty">${emptyMsg}</div>`;

  const activeN = ALL.filter(c=>!discarded.has(c.name)).length;
  document.getElementById('active-count').textContent   = activeN;
  document.getElementById('discard-count').textContent  = discarded.size;
  document.getElementById('fav-count').textContent      = [...favs].filter(n=>!discarded.has(n)).length;
  document.getElementById('count-label').textContent    = `${visible.length} shown`;
}

render();
</script>
</body>
</html>
